# Batch Merge — union all mesh files found in a folder.
# Every supported mesh file (.obj .off .ply .stl) is merged in filename order.
mode         = BATCH_MERGE
input_folder = sample/models/
output_path  = output/batch_result.obj

# --- Alternative: index-range pattern mode ---
# Merges mesh_000.obj through mesh_009.obj
# mode          = BATCH_MERGE
# input_pattern = sample/models/mesh_%03d.obj
# input_start   = 0
# input_end     = 9
# output_path   = output/batch_result.obj

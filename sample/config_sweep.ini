# Transform Sweep — stamp a single base mesh at each pose from a CSV.
# Each row of the CSV is a row-major 4x4 transformation matrix (16 values).
# The base mesh is copied at every pose and unioned into the growing result,
# simulating a 3D "brush stroke" along a path.
mode           = TRANSFORM_SWEEP
base_model     = sample/model/brush.obj
transforms_csv = sample/transforms.csv
output_path    = output/sweep_result.obj
